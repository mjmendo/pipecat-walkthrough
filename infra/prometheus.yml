global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: pipecat
    static_configs:
      # Pipecat bot exposes metrics at :8000/metrics (PrometheusMetricsObserver)
      - targets: ["host.docker.internal:8000"]
    # host.docker.internal resolves to the Docker host on macOS/Windows
    # On Linux: use the host IP (e.g., 172.17.0.1) or use network_mode: host
